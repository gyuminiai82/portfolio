<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Background Circle Gradient -->
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    
    <!-- Briefcase Body Gradient -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98" />
      <stop offset="100%" stop-color="#f8fafc" stop-opacity="0.95" />
    </linearGradient>

    <!-- Shadow for Depth -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="125%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Glowing background circle -->
  <circle cx="256" cy="256" r="224" fill="url(#circleGrad)" />

  <!-- Briefcase Graphic -->
  <g filter="url(#dropShadow)">
    <!-- Handle -->
    <path d="M192 176v-20c0-22.1 17.9-40 40-40h48c22.1 0 40 17.9 40 40v20" 
          stroke="#ffffff" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Body -->
    <rect x="96" y="176" width="320" height="224" rx="28" fill="url(#bodyGrad)" />
    
    <!-- Front Pocket Line -->
    <path d="M96 248c0 0 80 20 160 20s160-20 160-20" 
          stroke="#e2e8f0" stroke-width="8" stroke-linecap="round" />
          
    <!-- Metallic Lock/Clasp -->
    <rect x="232" y="232" width="48" height="40" rx="8" fill="#3b82f6" />
    <circle cx="256" cy="252" r="6" fill="#ffffff" />
    
    <!-- Decorative Code Brackets (indicating developer portfolio) -->
    <path d="M156 312l-10 10 10 10" stroke="#64748b" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M184 312l10 10-10 10" stroke="#64748b" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M172 308l-4 18" stroke="#64748b" stroke-width="6" stroke-linecap="round" />
  </g>
</svg>